server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API proxy — tarayici her seyi port 80'den gorur, CORS gerekmez
    location /api/ {
        proxy_pass http://dotnet_api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Çalışan fotoğrafları — backend static files
    location /uploads/ {
        proxy_pass http://dotnet_api:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React router fallback
    location / {
        try_files $uri /index.html;
    }
}
